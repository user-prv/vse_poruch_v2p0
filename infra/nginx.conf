map $http_x_cutover_mode $cutover_mode {
  default hybrid;
  legacy legacy;
  hybrid hybrid;
  v2 v2;
}

upstream v2_frontend { server frontend:80; }
upstream v2_backend { server backend:8080; }
upstream legacy_php { server legacy:80; }

server {
  listen 80;

  location /api/ {
    if ($cutover_mode = legacy) { proxy_pass http://legacy_php; break; }
    proxy_pass http://v2_backend;
  }

  location = /index.php { return 301 /; }
  location = /categories.php { return 301 /categories; }
  location ~* ^/item.php\?id=(\d+)$ { return 301 /items/$1; }
  location ~* ^/user.php\?id=(\d+)$ { return 301 /users/$1; }

  location / {
    if ($cutover_mode = legacy) { proxy_pass http://legacy_php; break; }
    proxy_pass http://v2_frontend;
  }
}
