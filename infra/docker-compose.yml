version: '3.9'
services:
  db:
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: vseporuch
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      LOG_FORMAT: json
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: vseporuch
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  legacy:
    image: php:8.2-apache
    volumes:
      - ../vseporuch-old:/var/www/html

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - legacy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"

volumes:
  mysql_data:
