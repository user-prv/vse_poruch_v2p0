version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vseporuch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      LOG_FORMAT: json
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: vseporuch
      DB_SSLMODE: disable
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  legacy:
    image: php:8.2-apache
    volumes:
      - ../vseporuch-old:/var/www/html

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - legacy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"

volumes:
  pg_data:
